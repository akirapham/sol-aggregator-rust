name: Docker Compose ETH Build Check

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docker/Dockerfile.eth'
      - 'docker-compose.eth.yml'
      - 'bins/amm-eth/**'
      - 'bins/arbitrade-eth/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/docker-eth-build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docker/Dockerfile.eth'
      - 'docker-compose.eth.yml'
      - 'bins/amm-eth/**'
      - 'bins/arbitrade-eth/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/docker-eth-build.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Run cargo fmt check
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build amm-eth
        run: cargo build --release --bin amm-eth

      - name: Build arbitrade-eth
        run: cargo build --release --bin arbitrade-eth

      - name: Verify docker-compose.eth.yml syntax
        run: |
          sudo apt-get update && sudo apt-get install -y docker-compose > /dev/null 2>&1
          docker-compose -f docker-compose.eth.yml config > /dev/null
          echo "✅ docker-compose.eth.yml syntax is valid"

      - name: Lint Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint --ignore DL3008,DL3009 < docker/Dockerfile.eth
          echo "✅ Dockerfile passes linting"
