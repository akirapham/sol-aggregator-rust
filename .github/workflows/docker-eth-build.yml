name: Docker Compose ETH Build Check

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docker/Dockerfile.eth'
      - 'docker-compose.eth.yml'
      - 'bins/amm-eth/**'
      - 'bins/arbitrade-eth/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/docker-eth-build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'docker/Dockerfile.eth'
      - 'docker-compose.eth.yml'
      - 'bins/amm-eth/**'
      - 'bins/arbitrade-eth/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/docker-eth-build.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code with PAT
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          submodules: recursive

      - name: Configure Git for private submodules
        run: |
          git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            libprotobuf-dev \
            pkg-config \
            libssl-dev \
            libclang-dev \
            clang \
            > /dev/null 2>&1
          echo "✅ Build dependencies installed"

