[package]
name = "sol-agg-rust"
version = "0.1.0"
edition = "2021"
authors = ["Your Name <your.email@example.com>"]
description = "A Solana DEX aggregator supporting multiple protocols"
license = "MIT"

[dependencies]
# Solana dependencies
solana-client = "3.0.2"
solana-sdk = "3.0.0"
solana-program = "3.0.0"
solana-account-decoder = "3.0.2"
anchor-client = "0.31.1"
anchor-lang = "0.31.1"

tonic = "0.14.2"
tonic-health = "0.14.2"
prost = "0.14.1"

# Serialization and async
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
tokio-stream = "0.1"
async-trait = "0.1"

# HTTP client for RPC calls (minimal usage)
reqwest = { version = "0.12.23", features = ["json"] }

# Error handling
anyhow = "1.0"
thiserror = "2.0.16"

# Math and decimal handling
rust_decimal = "1.32"
num-traits = "0.2"

# Futures for async operations
futures = "0.3"

# Environment variable support
dotenv = "0.15"
envy = "0.4"

# Logging
log = "0.4"
env_logger = "0.11.8"

# Base58 encoding for Solana addresses
bs58 = "0.5"

# Borsh serialization (used by many Solana programs)
borsh = "1.5.7"

# Spl token program
spl-token = "8.0.0"

solana-streamer-sdk = { path = "./crates/solana-streamer" }

spl-token-2022 = "9.0.0"

solana-commitment-config = "3.0.0"
yellowstone-grpc-proto = {  version = "8.0.0" }

# Anchor program dependencies for specific DEXs
# These will be added as we implement each DEX

[dev-dependencies]
tokio-test = "0.4"
env_logger = "0.11.8"
