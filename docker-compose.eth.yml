# Docker Compose for Ethereum Services (AMM Listener and Arbitrage)
services:
  # Ethereum AMM Listener
  amm-eth:
    build:
      context: .
      dockerfile: docker/Dockerfile.eth
    container_name: amm-eth-listener
    restart: unless-stopped
    environment:
      - RUST_LOG=${RUST_LOG:-info}
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
      - ./rocksdb_data/amm-eth:/app/rocksdb_data/amm-eth
    networks:
      - eth-network
    ports:
      - "${ETH_PRICE_WS_PORT:-8080}:${ETH_PRICE_WS_PORT:-8080}"
    command: /usr/local/bin/amm-eth

  # Ethereum Arbitrage Service
  arbitrade-eth:
    build:
      context: .
      dockerfile: docker/Dockerfile.eth
    tty: true
    stdin_open: true
    container_name: arbitrade-eth-service
    restart: "no"
    ports:
      - "${ARBITRADE_PORT:-3001}:${ARBITRADE_PORT:-3001}"
    environment:
      - RUST_LOG=info
      - DEX_PRICE_STREAM=ws://amm-eth:${ETH_PRICE_WS_PORT:-8080}
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
    networks:
      - eth-network
    depends_on:
      amm-eth:
        condition: service_started
    command: /usr/local/bin/arbitrade-eth
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:$${ARBITRADE_PORT:-3001}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
      disable: true

networks:
  eth-network:
    driver: bridge
