# Docker Compose for Solana DEX Aggregator

services:
  postgres:
    image: postgres:15-alpine
    container_name: aggregator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aggregator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aggregator_password}
      POSTGRES_DB: ${POSTGRES_DB:-aggregator_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./bins/aggregator-sol/migrations:/docker-entrypoint-initdb.d
    networks:
      - aggregator-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aggregator}"]
      interval: 10s
      timeout: 5s
      retries: 5

  hasura:
    image: hasura/graphql-engine:v2.36.0
    container_name: aggregator-hasura
    restart: unless-stopped
    ports:
      - "${HASURA_PORT:-8080}:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgresql://${POSTGRES_USER:-aggregator}:${POSTGRES_PASSWORD:-aggregator_password}@postgres:5432/${POSTGRES_DB:-aggregator_db}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET:-hasura_admin_secret}
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
      HASURA_GRAPHQL_ENABLE_TELEMETRY: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aggregator-network

  aggregator:
    build:
      context: .
      dockerfile: docker/Dockerfile.sol
    container_name: solana-aggregator
    restart: unless-stopped
    network_mode: host
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      # Path inside the container where arbitrage_config.toml will be mounted
      - ARBITRAGE_CONFIG_PATH=/app/arbitrage_config.toml
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aggregator}:${POSTGRES_PASSWORD:-aggregator_password}@127.0.0.1:5432/${POSTGRES_DB:-aggregator_db}
      - ENABLE_ARBITRAGE_DETECTION=false
    env_file:
      - .env
    volumes:
      # Mount the .env file for configuration
      - ./.env:/app/.env:ro
      # Optional: Mount logs directory
      - ./logs:/app/logs
      - ./rocksdb_data:/app/rocksdb_data
      # Mount the arbitrage config so the service can find it at runtime
      - ./bins/aggregator-sol/arbitrage_config.toml:/app/arbitrage_config.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${API_PORT:-3000}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    stop_grace_period: 60s
    stop_signal: SIGTERM

  # Optional: Redis for caching (uncomment if using redis)
  # redis:
  #   image: redis:7-alpine
  #   container_name: aggregator-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - aggregator-network
  #   command: redis-server --appendonly yes

networks:
  aggregator-network:
    driver: bridge

volumes:
  postgres-data:
  # redis-data:
