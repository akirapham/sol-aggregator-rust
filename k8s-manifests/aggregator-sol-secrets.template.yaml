# TEMPLATE: Secret for Aggregator-Sol (sensitive configuration)
# ============================================================
# IMPORTANT: This is a TEMPLATE file. Do NOT commit real secrets!
#
# Usage:
#   1. Copy this file: cp aggregator-sol-secrets.template.yaml aggregator-sol-secrets.yaml
#   2. Replace <BASE64_ENCODED_VALUE> placeholders with actual base64-encoded values
#   3. Apply: kubectl apply -f aggregator-sol-secrets.yaml
#
# To encode a value: echo -n "your-value" | base64
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: aggregator-sol-secrets
  namespace: aggregators
  labels:
    app: aggregator-sol
type: Opaque
data:
  # ===========================================
  # RPC Configuration (REQUIRED)
  # ===========================================
  # Primary Solana RPC endpoint
  # Example: echo -n "https://mainnet.helius-rpc.com/?api-key=xxx" | base64
  RPC_URL: <BASE64_ENCODED_VALUE>
  
  # Yellowstone gRPC endpoint for streaming
  # Example: echo -n "https://solana-yellowstone-grpc.publicnode.com:443" | base64
  YELLOWSTONE_GRPC_URL: <BASE64_ENCODED_VALUE>
  
  # Backup gRPC endpoint
  BACKUP_GRPC_URL: <BASE64_ENCODED_VALUE>
  
  # ===========================================
  # Database Configuration (REQUIRED)
  # ===========================================
  # PostgreSQL connection URL
  # Example: echo -n "postgresql://user:password@postgres:5432/aggregator_db" | base64
  DATABASE_URL: <BASE64_ENCODED_VALUE>
  
  # Individual DB credentials (for init containers or debugging)
  POSTGRES_USER: <BASE64_ENCODED_VALUE>
  POSTGRES_PASSWORD: <BASE64_ENCODED_VALUE>
  POSTGRES_DB: <BASE64_ENCODED_VALUE>
  
  # ===========================================
  # Optional: Hasura Admin Secret
  # ===========================================
  # HASURA_ADMIN_SECRET: <BASE64_ENCODED_VALUE>
  
  # ===========================================
  # Optional: Private RPC Keys (if using premium RPCs)
  # ===========================================
  # HELIUS_API_KEY: <BASE64_ENCODED_VALUE>
  # QUICKNODE_API_KEY: <BASE64_ENCODED_VALUE>
