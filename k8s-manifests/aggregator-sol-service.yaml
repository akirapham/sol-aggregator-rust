# Service for Aggregator-Sol
apiVersion: v1
kind: Service
metadata:
  name: aggregator-sol
  namespace: aggregators
  labels:
    app: aggregator-sol
spec:
  type: ClusterIP
  selector:
    app: aggregator-sol
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
---
