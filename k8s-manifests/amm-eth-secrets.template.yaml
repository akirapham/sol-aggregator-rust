apiVersion: v1
kind: Secret
metadata:
  name: amm-eth-secrets
  namespace: aggregators
type: Opaque
stringData:
  # Blockchain RPC (Contains Alchemy API key - SENSITIVE)
  ETH_RPC_URL: "https://eth-mainnet.g.alchemy.com/v2/YOUR_ALCHEMY_API_KEY_HERE"
  ETH_WEBSOCKET_URL: "wss://eth-mainnet.g.alchemy.com/v2/YOUR_ALCHEMY_API_KEY_HERE"
