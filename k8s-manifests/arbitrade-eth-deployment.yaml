apiVersion: apps/v1
kind: Deployment
metadata:
  name: arbitrade-eth
  namespace: aggregators
  labels:
    app: arbitrade-eth
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: arbitrade-eth
  template:
    metadata:
      labels:
        app: arbitrade-eth
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - name: arbitrade-eth
        image: ${REGISTRY_URL}/arbitrade-eth:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: api
          protocol: TCP
        envFrom:
        - configMapRef:
            name: arbitrade-eth-config
        - secretRef:
            name: arbitrade-eth-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 120
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 60
          periodSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: rocksdb-data
          mountPath: /app/rocksdb_data
      volumes:
      - name: rocksdb-data
        persistentVolumeClaim:
          claimName: arbitrade-eth-pvc
