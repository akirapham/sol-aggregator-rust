# ⚠️  TEMPLATE FILE - DO NOT COMMIT ACTUAL VALUES!
#
# This file shows the structure of secrets needed for arbitrade-eth.
# Replace example values with actual secrets from GitHub Settings → Secrets
#
# This file is for DOCUMENTATION ONLY.
# Actual secrets are created by GitHub Actions workflow from GitHub Secrets vault.
#
# DO NOT:
# ❌ Commit real secret values to Git
# ❌ Copy this file to your k3s server
# ❌ Use this file directly in kubectl apply
#
# The GitHub Actions workflow (deploy-to-k3s.yml) creates the actual secret:
#   kubectl create secret generic arbitrade-eth-secrets -n aggregators \
#     --from-literal=ETH_RPC_URL=${{ secrets.K8S_ETH_RPC_URL }} \
#     --from-literal=ETH_PRIVATE_KEY=${{ secrets.K8S_ETH_PRIVATE_KEY }} \
#     --from-literal=DASHBOARD_USERNAME=${{ secrets.K8S_DASHBOARD_USERNAME }} \
#     ...

apiVersion: v1
kind: Secret
metadata:
  name: arbitrade-eth-secrets
  namespace: aggregators
type: Opaque
stringData:
  # Blockchain RPC (Contains Alchemy API key - SENSITIVE)
  ETH_RPC_URL: "https://eth-mainnet.g.alchemy.com/v2/YOUR_ALCHEMY_API_KEY_HERE"
  ETH_WEBSOCKET_URL: "wss://eth-mainnet.g.alchemy.com/v2/YOUR_ALCHEMY_API_KEY_HERE"

  # Wallet Private Key (HIGHLY SENSITIVE - Never log, never share!)
  ETH_PRIVATE_KEY: "0xYOUR_PRIVATE_KEY_HERE"

  # Dashboard Authentication
  DASHBOARD_USERNAME: "admin"
  DASHBOARD_PASSWORD: "YOUR_SECURE_PASSWORD_HERE"

  # MEXC Exchange API Keys
  MEXC_API_KEY: "YOUR_MEXC_API_KEY_HERE"
  MEXC_API_SECRET: "YOUR_MEXC_API_SECRET_HERE"
  MEXC_ERC20_DEPOSIT_ADDRESS: "0xYOUR_MEXC_DEPOSIT_ADDRESS_HERE"

  # Bybit Exchange API Keys
  BYBIT_API_KEY: "YOUR_BYBIT_API_KEY_HERE"
  BYBIT_API_SECRET: "YOUR_BYBIT_API_SECRET_HERE"
  BYBIT_ERC20_DEPOSIT_ADDRESS: "0xYOUR_BYBIT_DEPOSIT_ADDRESS_HERE"

  # KuCoin Exchange API Keys
  KUCOIN_API_KEY: "YOUR_KUCOIN_API_KEY_HERE"
  KUCOIN_API_SECRET: "YOUR_KUCOIN_API_SECRET_HERE"
  KUCOIN_API_PASSPHRASE: "YOUR_KUCOIN_PASSPHRASE_HERE"
  KUCOIN_ERC20_DEPOSIT_ADDRESS: "0xYOUR_KUCOIN_DEPOSIT_ADDRESS_HERE"

  # Bitget Exchange API Keys
  BITGET_API_KEY: "YOUR_BITGET_API_KEY_HERE"
  BITGET_API_SECRET: "YOUR_BITGET_API_SECRET_HERE"
  BITGET_API_PASSPHRASE: "YOUR_BITGET_PASSPHRASE_HERE"
  BITGET_ERC20_DEPOSIT_ADDRESS: "0xYOUR_BITGET_DEPOSIT_ADDRESS_HERE"

  # Gate.io Exchange API Keys
  GATE_API_KEY: "YOUR_GATE_API_KEY_HERE"
  GATE_API_SECRET: "YOUR_GATE_API_SECRET_HERE"
